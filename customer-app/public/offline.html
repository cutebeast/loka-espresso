<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loka Espresso - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #E4EAEF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1B2023;
    }
    .card {
      background: #FFFFFF;
      border-radius: 24px;
      padding: 48px 32px;
      text-align: center;
      max-width: 320px;
      width: 90%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .icon {
      width: 72px;
      height: 72px;
      border-radius: 999px;
      background: #E8EDE0;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 32px;
    }
    h1 {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 8px;
      color: #1B2023;
    }
    p {
      font-size: 14px;
      color: #6A7A8A;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    button {
      background: #384B16;
      color: #FFFFFF;
      border: none;
      padding: 14px 28px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">☕</div>
    <h1>You're offline</h1>
    <p>Please check your internet connection and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
