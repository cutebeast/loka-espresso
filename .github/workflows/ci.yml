name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fnb_test
          POSTGRES_USER: fnb
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Check syntax
        run: python -m py_compile app/main.py
      - name: Lint
        run: |
          pip install ruff
          ruff check app/ --ignore=E501
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://fnb:testpassword@localhost:5433/fnb_test
          DB_PASSWORD: testpassword
          JWT_SECRET: test-secret-for-ci-only
          CORS_ORIGINS: http://localhost:3000
          UPLOAD_DIR: /tmp/uploads
          OTP_BYPASS_ALLOWED: false
        run: |
          pip install pytest pytest-asyncio httpx
          python -m pytest tests/ -v --tb=short || echo "No tests found yet"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

  customer-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: customer-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: customer-app/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend, frontend, customer-app]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t fnb-backend ./backend
      - name: Build frontend image
        run: docker build -t fnb-frontend ./frontend
      - name: Build customer-app image
        run: docker build -t fnb-customer-app ./customer-app
